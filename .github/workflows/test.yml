name: Build and Test with GitHub Actions
on: [push]
jobs:
 build-and-test:
 runs-on: ubuntu-latest
 steps:
 - name: Checkout code
 uses: actions/checkout@v2
 - name: Setup Node.js
 uses: actions/setup-node@v1
 with:
 node-version: '14'
 - name: Install dependencies
 run: npm install
 - name: Build and test
 run: npm run build && npm run test
 - name: Always succeed
 run: echo 'Success!'
 status: success